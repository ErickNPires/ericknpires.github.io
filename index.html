<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">

    <title>Erick Pires - Portfólio</title>
    <style>
        body {

            background-color: #383d40;

</html>
